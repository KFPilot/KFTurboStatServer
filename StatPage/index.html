<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>
    Chart.defaults.color = '#8b949e';
    Chart.defaults.borderColor = '#21262d';
    Chart.defaults.backgroundColor = 'rgba(88, 166, 255, 0.6)';
    Chart.defaults.devicePixelRatio = Math.max(window.devicePixelRatio, 2);
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#/">Turbo Stats</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="navLinks"></ul>
                <div class="d-flex align-items-center gap-2 me-3" id="gametypeFilter" hidden>
                    <span class="navbar-text me-1">Mode:</span>
                    <div class="btn-group"></div>
                </div>
                <div class="d-flex align-items-center gap-2" id="difficultyFilter" hidden>
                    <span class="navbar-text me-1">Difficulty:</span>
                    <div class="btn-group"></div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container-fluid px-4" id="root">
        <p class="text-muted">Loading…</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
