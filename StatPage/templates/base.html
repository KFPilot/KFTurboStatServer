<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KFTurbo Stats{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>
    Chart.defaults.color = '#8b949e';
    Chart.defaults.borderColor = '#21262d';
    Chart.defaults.backgroundColor = 'rgba(88, 166, 255, 0.6)';
    Chart.defaults.devicePixelRatio = Math.max(window.devicePixelRatio, 2);
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">KFTurbo Stats</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/?{{ filter_qs }}">Overview</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leaderboards?{{ filter_qs }}">Leaderboards</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cards">Cards</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/perks?{{ filter_qs }}">Perks</a>
                    </li>
                </ul>
                {% if all_gametypes %}
                <form class="d-flex align-items-center gap-2" id="gametypeFilter" method="get">
                    <span class="navbar-text me-1">Filter:</span>
                    {% for gt in all_gametypes %}
                    <div class="form-check form-check-inline mb-0">
                        <input class="form-check-input" type="checkbox" name="gametypes" value="{{ gt }}" id="gt_{{ gt }}"
                            {{ "checked" if gt in selected_gametypes or not selected_gametypes }}>
                        <label class="form-check-label" for="gt_{{ gt }}">{{ gt | gametype_name }}</label>
                    </div>
                    {% endfor %}
                </form>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('gametypeFilter');
        if (!form) return;
        form.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', function() {
                const checked = Array.from(form.querySelectorAll('input:checked')).map(c => c.value);
                const allBoxes = form.querySelectorAll('input[type="checkbox"]');
                // If all are checked or none are checked, navigate without filter params
                const params = new URLSearchParams();
                if (checked.length > 0 && checked.length < allBoxes.length) {
                    checked.forEach(g => params.append('gametypes', g));
                }
                window.location.href = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            });
        });
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
